<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>swf2lottie fixture compare</title>
    <link rel="stylesheet" href="./fixtures.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>fixture compare</h1>
        <p class="caption">Left is <code>out</code>, right is <code>out-web</code>. Hover a tile to play. Default state is frame 0.</p>
      </header>
      <section class="compare-head" aria-hidden="true">
        <div class="compare-head-name">fixture</div>
        <div class="compare-head-column">out</div>
        <div class="compare-head-column">out-web</div>
      </section>
      <section id="gallery" class="gallery" aria-live="polite"></section>
    </main>
    <div id="build-badge" class="build-badge" aria-hidden="true"></div>

    <script src="./vendor/lottie.min.js"></script>
    <script type="module" src="./fixtures.js"></script>
  </body>
</html>
